<div id="api-results-wrapper" style="background: #fff; border: 2px solid #10b981; border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h4 style="margin: 0; color: #065f46; display: flex; align-items: center; gap: 8px;">
            <span style="font-size: 1.2rem;">🌍</span> Found in Football API
        </h4>

        <div style="flex: 1; max-width: 400px; margin: 0 20px;">
            <input type="text"
                   id="apiLeagueSearch"
                   placeholder="Search 700+ results by name or country..."
                   style="width: 100%; padding: 8px 12px; border-radius: 20px; border: 1px solid #d1d5db; font-size: 0.85rem;"
                   oninput="filterApiResults()">
        </div>

        <button onclick="document.getElementById('external-search-results').innerHTML=''"
                style="cursor:pointer; border:none; background:#fee2e2; color: #b91c1c; padding: 5px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold;">
            Close List
        </button>
    </div>

    <div id="api-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; max-height: 450px; overflow-y: auto; padding: 5px;">

        {% for item in api_data %}
        <div class="api-league-card"
             data-search="{{ item.league.name|lower }} {{ item.country.name|lower }}"
             style="border: 1px solid #e5e7eb; padding: 12px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; background: #fdfdfd;">

            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="{{ item.league.logo }}" width="35" height="35" loading="lazy">
                <div>
                    <div style="font-weight: 700; font-size: 0.9rem; color: #111827;">{{ item.league.name }}</div>
                    <span style="font-weight: normal; color: #9ca3af; font-size: 0.8rem; margin-left: 4px;">
                        ({{ item.league.id }})
                    </span>
                    <div style="font-size: 0.75rem; color: #6b7280;">{{ item.country.name }}</div>
                </div>
            </div>

            <button hx-post="{% url 'save_league_from_api' %}"
                    hx-vals='{"league_id": "{{ item.league.id }}"}'
                    hx-swap="outerHTML"
                    style="background: #007bff; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer;">
                Add
            </button>
        </div>
        {% endfor %}
    </div>

    <script>
        function filterApiResults() {
            const searchTerm = document.getElementById('apiLeagueSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.api-league-card');

            cards.forEach(card => {
                const text = card.getAttribute('data-search');
                if (text.includes(searchTerm)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>
</div>
